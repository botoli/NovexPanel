version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: novex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novex}
      POSTGRES_DB: ${POSTGRES_DB:-novex}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
